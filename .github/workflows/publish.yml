name: Publish to GitHub Packages

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://npm.pkg.github.com"
          scope: "@smiziara"

      - run: bun install --frozen-lockfile

      - run: bun run build

      - name: Rewrite package scopes for GitHub Packages
        shell: bash
        run: |
          OWNER="${GITHUB_REPOSITORY_OWNER}"
          SCOPE="@${OWNER}"

          for pkg in packages/*/package.json; do
            # Rewrite package name: @react-querybuilder/foo -> @owner/react-querybuilder-foo
            # and react-querybuilder -> @owner/react-querybuilder
            node -e "
              const fs = require('fs');
              const pkg = JSON.parse(fs.readFileSync('$pkg', 'utf8'));
              const oldName = pkg.name;
              if (oldName.startsWith('@react-querybuilder/')) {
                pkg.name = '${SCOPE}/react-querybuilder-' + oldName.replace('@react-querybuilder/', '');
              } else if (oldName === 'react-querybuilder') {
                pkg.name = '${SCOPE}/react-querybuilder';
              }
              pkg.publishConfig = { registry: 'https://npm.pkg.github.com' };
              fs.writeFileSync('$pkg', JSON.stringify(pkg, null, 2) + '\n');
              console.log(oldName + ' -> ' + pkg.name);
            "
          done

      - name: Publish packages
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for pkg in packages/*/; do
            if [ -f "$pkg/package.json" ]; then
              echo "Publishing $pkg..."
              cd "$pkg"
              npm publish --access public || echo "Skipped $pkg (may already exist)"
              cd "$GITHUB_WORKSPACE"
            fi
          done
